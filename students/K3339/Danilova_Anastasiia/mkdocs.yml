# mkdocs.yml mkdocs serve -a localhost:8001 --livereload
site_name: Web development tools 2025-2026 - 6th semester
site_description: Лабораторные работы по курсу веб-программирования 6-ого семестра
site_author: Данилова Анастасия
site_url: https://k3339.github.io/ITMO_ICT_WebDevelopment_tools_2025-2026

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

repo_name: ITMO_ICT_WebDevelopment_tools_2025-2026
repo_url: https://github.com/k3339/ITMO_ICT_WebDevelopment_tools_2025-2026

nav:
  - Home: index.md
  - Laboratory Work 1: 
      - lab1/laboratory.md
      - lab1/entities.md
      - lab1/api.md
      - lab1/practices.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["laboratory_work_1"]

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.details
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/k3339
    - icon: fontawesome/brands/telegram
      link: https://t.me/k3339
